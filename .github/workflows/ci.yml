name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check every script
        run: |
          node --check voice-widget.js
          node --check pixel-alex.js
          node --check script.js
          for f in api/*.js; do node --check "$f"; done

      # No browser needed, so it runs before the Chromium install.
      - name: Speech normalizer suite
        run: node test/verify-tts-text.js

      - name: Install test dependencies
        working-directory: test
        run: npm install

      - name: Install Chromium
        working-directory: test
        run: npx playwright-core install chromium-headless-shell

      - name: Widget behavioral suite
        run: node test/verify-widget.js
